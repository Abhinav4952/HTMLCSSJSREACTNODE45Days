<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 14 — Task 03 — Flex metrics dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main class="dash">
      <header class="dash__head">
        <h1>Canary dashboard</h1>
        <p class="dash__sub">
          <!-- TODO(Day14-task03): One sentence original subtitle. -->
        </p>
      </header>

      <section class="dash__metrics" aria-label="Key metrics">
        <article class="metric metric--a">
          <h2>p95 latency</h2>
          <p class="metric__value">120ms</p>
        </article>
        <article class="metric metric--b">
          <h2>Error rate</h2>
          <p class="metric__value">0.4%</p>
        </article>
        <article class="metric metric--c">
          <h2>Rollouts</h2>
          <p class="metric__value">3</p>
        </article>
      </section>
    </main>
  </body>
</html>
