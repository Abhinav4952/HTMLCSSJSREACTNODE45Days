<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 14 — Task 01 — Flex alignment playground</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main class="page">
      <h1>Alignment playground</h1>

      <section class="demo" aria-label="Row demo">
        <h2>Row</h2>
        <div class="flex flex--row">
          <div class="box">Alpha</div>
          <div class="box">Bravo</div>
          <div class="box">Charlie</div>
        </div>
      </section>

      <section class="demo" aria-label="Column demo">
        <h2>Column</h2>
        <div class="flex flex--col">
          <div class="box">One</div>
          <div class="box">Two</div>
          <div class="box">Three</div>
        </div>
      </section>

      <p class="note">
         I once didn't realize the flexbox was in column-direction and kept trying to use <code>justify-content</code> for horizontal alignment and <code>align-items</code> for vertical alignment.
      </p>
    </main>
  </body>
</html>
