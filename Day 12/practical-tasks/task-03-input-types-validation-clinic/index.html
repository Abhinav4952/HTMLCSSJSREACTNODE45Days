<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 12 — Task 03 — Input types + validation clinic</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main class="page">
      <h1>Field tech intake</h1>
      <p class="lede">
        Use native types + constraints first. Server validation is still required in production—this page is a clinic.
      </p>

      <form class="intake" name="intake" method="get" action="#" novalidate>
        <!-- TODO(Day12-task03): Add a proper submit button and a reset button with safe default text (your wording). -->

        <fieldset>
          <legend>Contact</legend>

          <div class="field">
            <label for="email">Work email</label>
            <!-- TODO(Day12-task03): Make this a real email field with autocomplete hint + required. -->
            <input id="email" name="email" type="text">
          </div>

          <div class="field">
            <label for="website">Docs site</label>
            <!-- TODO(Day12-task03): Use URL input with placeholder guidance and required. -->
            <input id="website" name="website" type="text">
          </div>

          <div class="field">
            <label for="deploy">Deploy window</label>
            <!-- TODO(Day12-task03): Use date input with reasonable min/max (pick dates in 2026) and required. -->
            <input id="deploy" name="deploy" type="text">
          </div>
        </fieldset>

        <fieldset>
          <legend>Sizing</legend>

          <div class="field">
            <label for="nodes">Node count</label>
            <!-- TODO(Day12-task03): Use number input: min 1 max 500 step 1 required. -->
            <input id="nodes" name="nodes" type="text">
          </div>

          <div class="field">
            <label for="risk">Risk index</label>
            <!-- TODO(Day12-task03): Keep type="range" min/max as given; add a concise visible hint near the label (text node or span) explaining how you will verify changing values without JavaScript (DevTools / browser UI). -->
            <input id="risk" name="risk" type="range" min="0" max="10" value="3">
            <p class="risk-readout" aria-live="polite">
              <!-- TODO(Day12-task03): Replace with your own short note that includes the word "Risk" and references checking the input's current value after interaction. -->
            </p>
          </div>
        </fieldset>

        <p class="form-footnote">
          <!-- TODO(Day12-task03): Explain in your own words why `novalidate` is present on the form for this exercise. -->
        </p>
      </form>
    </main>
  </body>
</html>
