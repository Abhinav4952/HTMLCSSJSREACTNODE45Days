<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 12 — Task 04 — Constraint validation UX patterns</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main class="page">
      <h1>Account handle</h1>
      <form class="handle-form" method="get" action="#">
        <div class="field">
          <label for="handle">Handle</label>
          <input
            id="handle"
            name="handle"
            type="text"
            autocomplete="username"
            minlength="3"
            maxlength="15"
            pattern="/^[a-z][a-z0-9_-]{2,14}$/"
            required
            aria-describedby="handle-help handle-error"
          >
          <p id="handle-help" class="help">
            Start your username with a lowercase letter (a–z).<br>
            After the first letter, you may use lowercase letters, numbers, underscores (_), or hyphens (-).<br>
            Your username must be between 3 and 15 characters long in total.<br>
            </p>
          <p id="handle-error" class="error" role="alert">
             Invalid Username. Please use the above rules to create a handle              
          </p>
        </div>

        <button type="submit">Save handle</button>
      </form>
    </main>
  </body>
  
</html>
