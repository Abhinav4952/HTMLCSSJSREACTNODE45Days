<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 03 — Task 04 — Pricing table</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main>
      <h1>Pricing lab</h1>
      <!-- TODO(Day03-task04): Create pricing table with caption, thead feature column + 3 tier columns, tbody rows comparing features (checkmarks/text/numbers), and a visually highlighted recommended tier column. -->
       <table>
        <caption>Pricing Plans</caption>
        <thead>
          <th>Features</th>
          <th>Basic</th>
          <th class="is-recommended">Pro (Recommended)</th>
          <th>Premium</th>
        </thead>
        <tbody>
          <tr>
            <td scope="row">Monthly Price</td>
            <td>Rs. 9</td>
            <td class="is-recommended">Rs. 19</td>
            <td>Rs. 39</td>
          </tr>
          <tr>
            <td scope="row">Device Limit</td>
            <td>1</td>
            <td class="is-recommended">3</td>
            <td>Unlimited</td>
          </tr>
          <tr>
            <td scope="row">Resolution</td>
            <td>480p</td>
            <td class="is-recommended">720p</td>
            <td>1080p</td>
          </tr>
          <tr>
            <td scope="row">Download Available?</td>
            <td>No</td>
            <td class="is-recommended">Yes</td>
            <td>Yes</td>
          </tr>

        </tbody>
       </table>
    </main>
  </body>
</html>
