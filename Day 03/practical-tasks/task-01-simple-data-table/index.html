<!DOCTYPE html>

  <body>

      <h1>Simple data table</h1>
      <!-- TODO(Day03-task01): Create a <table> with <caption> describing your dataset. -->

          <caption>Student Marksheet</caption>
          <tbody>
            <tr>
              <td>Roll No.</td>
              <td>Name</td>
              <td>Marks</td>
            </tr>
            <tr>
              <td>101</td>
              <td>Alice</td>
              <td>94</td>
            </tr>
            <tr>
              <td>102</td>
              <td>Bob</td>
              <td>84</td>
            </tr>
            <tr>
              <td>103</td>
              <td>Charlie</td>
              <td>90</td>
            </tr>
          </tbody>
        </table>
    </main>
