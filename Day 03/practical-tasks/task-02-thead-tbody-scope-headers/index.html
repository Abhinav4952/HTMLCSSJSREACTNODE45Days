<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 03 — Task 02 — Scoped headers</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main>
      <h1>Inventory table</h1>
      <!-- TODO(Day03-task02): Replace this comment with a complete table: caption; thead with 3 col headers (Item, Qty, Unit price); tbody with ≥4 rows where first column cells are th scope="row"; tfoot totals row that sums qty or price logically. -->
       <table>
          <caption>Store Inventory</caption>
          <thead>
            <th>Item</th>
            <th>Qty</th>
            <th>Unit price</th>
          </thead>
          <tbody>
            <tr>
              <th scope="row">Apples</th>
              <td>10</td>
              <td>20</td>
            </tr>
            <tr>
              <th scope="row">Eggs</th>
              <td>24</td>
              <td>15</td>
            </tr>
            <tr>
              <th scope="row">Bananas</th>
              <td>6</td>
              <td>10</td>
            </tr>
            <tr>
              <th scope="row">Bread</th>
              <td>4</td>
              <td>30</td>
            </tr>
            <tr>
              <th scope="row">Paneer</th>
              <td>3</td>
              <td>85</td>
            </tr>
            <tr>
              <th scope="row">Rice(1kg)</th>
              <td>2</td>
              <td>100</td>
            </tr>
          </tbody>
          <tfoot>
            <tr><th scope="row">Total</th><td>49</td><td>260</td></tr>
          </tfoot>
       </table>
    </main>
  </body>
</html>
