<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Day 15 — Task 01 — Attribute selectors: uploads + links</title>
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body>
    <main class="page">
      <h1>Upload bundle</h1>

      <form class="upload" method="get" action="#">
        <div class="field">
          <label for="bundle">Select a `.zip` or `.tgz`</label>
          <input id="bundle" name="bundle" type="file" accept=".zip,.tgz,application/zip,application/gzip">
        </div>
      </form>

      <section class="links" aria-label="Example links for selector practice">
        <h2>Related routes</h2>
        <ul>
          <li><a href="#incidents">In-app: incidents</a></li>
          <li><a href="https://example.com/docs">External: docs</a></li>
          <li><a href="mailto:class@university.edu">Email: instructor</a></li>
        </ul>
      </section>

      <p class="help">
         To select external HTTP links, I used the attribute selector <code>href</code> as <code>href^="https"</code>.
         The <b>^=</b> selects only those links which start with <b>https</b>
      </p>
    </main>
  </body>
</html>
