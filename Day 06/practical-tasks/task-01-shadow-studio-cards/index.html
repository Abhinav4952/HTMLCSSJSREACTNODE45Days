<!DOCTYPE html>
<html lang="en">
  <head>

  <body>
    <header class="hero">
      <p class="kicker">Day 06 lab</p>
      <!-- TODO(Day06-task01): Keep text, but you may tweak copy slightly if your instructor allows originality checks. -->
      <h1 class="hero-title">Shadows that explain elevation</h1>
      <p class="lede">
        Cards below should look like physical sheets. Buttons should feel pressable. Use layered shadows—not one giant blur.
      </p>
    </header>

    <main class="grid">
      <article class="card" tabindex="0">
        <h2>Card A</h2>
        <p>Hover me. Focus me with keyboard.</p>
      </article>
      <article class="card" tabindex="0">
        <h2>Card B</h2>
        <p>Shadow ramp should match Card A.</p>
      </article>
      <article class="card" tabindex="0">
        <h2>Card C</h2>
        <p>No random per-card shadows—use tokens.</p>
      </article>
    </main>

    <section class="cta-row">
      <button class="btn" type="button">Primary</button>
      <button class="btn btn-ghost" type="button">Ghost</button>
    </section>
